<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光学实验室 - WebGL路径追踪</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; display: none; z-index: 10; touch-action: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 20; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;}
        .info { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; text-shadow: 1px 1px 3px black; max-width: 300px; }
        .info h2 { margin: 0 0 10px 0; font-size: 22px; color: #4DA8DA; }
        .info p { margin: 5px 0; font-size: 14px; line-height: 1.4; color: #ddd; }
        .highlight { color: #FFD700; font-weight: bold; }
        canvas { display: block; }
        .dg.ac { z-index: 15 !important; }
    </style>
    <!-- 引入 NippleJS 用于移动端摇杆 -->
    <script src="https://unpkg.com/nipplejs@0.10.0/dist/nipplejs.js"></script>
</head>
<body>
    <div id="loading">🚀 正在编译路径追踪着色器，请稍候...</div>
    <div id="joystick-zone"></div>
    <div class="info">
        <h2>🔬 几何光学路径追踪</h2>
        <p>操作说明：<br>
           - 电脑: <span class="highlight">WASD/QE</span> 移动, <span class="highlight">鼠标拖动</span> 旋转视角, <span class="highlight">滚轮</span> 缩放<br>
           - 手机: <span class="highlight">左下角摇杆</span> 移动, <span class="highlight">单指滑动</span> 旋转视角, <span class="highlight">双指</span> 缩放
        </p>
        <p>✨ 采样累积数: <span id="sample-count" class="highlight" style="font-size: 18px;">0</span></p>
        <p style="color:#aaa; font-size: 12px; margin-top: 10px;">注：由于采用纯物理光线追踪，画面需要几秒钟累积光线才能看清光屏上的投影（如默认的倒立F实像），请保持画面静止。</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { GUI } from 'https://unpkg.com/lil-gui@0.17.0/dist/lil-gui.esm.min.js';

        // === 场景数据配置 ===
        const MAX_LENSES = 5;
        const MAX_SCREENS = 3;
        const MAX_LIGHTS = 3;

        let lenses = [];
        let screens = [];
        let lights = [];
        let envLight = 0.05;

        // 默认场景：f=7.5的凸透镜，u=15, v=15 成等大倒立实像
        lights.push({ type: 0, pos: new THREE.Vector3(0, 0, -15), color: new THREE.Color(0xffffff) }); // F光源
        lenses.push({ type: 0, pos: new THREE.Vector3(0, 0, 0), r: 7.5, aperture: 4.0 }); // 凸透镜
        screens.push({ type: 0, pos: new THREE.Vector3(0, 0, 15), aperture: 0.3 }); // 光屏

        // === WebGL渲染器与相机初始化 ===
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        // 调整初始位置：在光源后方左侧，斜向观察光具座和光屏
        camera.position.set(-10, 5, -22);
        // 对准光屏方向 (默认光屏在 Z=15 的位置，看向Z=10处可以将透镜和光屏尽收眼底)
        camera.lookAt(0, 0, 10);

        // 自动提取初始的偏航角和俯仰角，确保鼠标拖动控制平滑过渡
        const initialEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
        let cameraYaw = initialEuler.y;
        let cameraPitch = initialEuler.x;

        // === 累积缓冲 (Ping-Pong FBO) ===
        const rtOptions = { type: THREE.FloatType, minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter, format: THREE.RGBAFormat };
        let rtA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, rtOptions);
        let rtB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, rtOptions);
        
        const cameraPT = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const scenePT = new THREE.Scene();
        const sceneDisplay = new THREE.Scene();

        // === 核心路径追踪着色器 ===
        const ptFragmentShader = `
            precision highp float;
            precision highp int;
            
            uniform sampler2D tPrevious;
            uniform float u_sampleCount;
            uniform vec2 u_resolution;
            uniform mat4 u_cameraWorldMatrix;
            uniform mat4 u_cameraProjectionMatrixInverse;
            uniform float u_frame;
            uniform float u_envLight;

            #define MAX_LENSES ${MAX_LENSES}
            #define MAX_SCREENS ${MAX_SCREENS}
            #define MAX_LIGHTS ${MAX_LIGHTS}

            uniform int u_numLenses;
            uniform int u_lensTypes[MAX_LENSES];
            uniform vec3 u_lensPos[MAX_LENSES];
            uniform float u_lensR[MAX_LENSES];
            uniform float u_lensAperture[MAX_LENSES];

            uniform int u_numScreens;
            uniform int u_screenTypes[MAX_SCREENS];
            uniform vec3 u_screenPos[MAX_SCREENS];
            uniform float u_screenAperture[MAX_SCREENS];

            uniform int u_numLights;
            uniform int u_lightTypes[MAX_LIGHTS];
            uniform vec3 u_lightPos[MAX_LIGHTS];
            uniform vec3 u_lightColor[MAX_LIGHTS];

            varying vec2 vUv;

            #define MAT_DIFFUSE 1
            #define MAT_GLASS 2
            #define MAT_EMISSIVE 3
            #define MAT_SCREEN 4

            struct Material {
                int type;
                vec3 color;
                vec3 emissive;
            };

            struct Hit {
                float d;
                Material mat;
            };

            // 随机数生成器 (PCG)
            uint seed;
            uint pcg_hash(inout uint state) {
                state = state * 747796405u + 2891336453u;
                uint word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
                return (word >> 22u) ^ word;
            }
            float random() {
                return float(pcg_hash(seed)) / 4294967296.0;
            }

            // 余弦加权半球采样 (漫反射)
            vec3 cosineWeightedHemisphere(vec3 n) {
                float r1 = random();
                float r2 = random();
                float r = sqrt(r1);
                float theta = 2.0 * 3.14159265 * r2;
                vec3 t = normalize(cross(n, abs(n.y) > 0.5 ? vec3(1,0,0) : vec3(0,1,0)));
                vec3 b = cross(n, t);
                return normalize(t * r * cos(theta) + b * r * sin(theta) + n * sqrt(max(0.0, 1.0 - r1)));
            }

            // 均匀球面采样
            vec3 uniformSphere() {
                float z = random() * 2.0 - 1.0;
                float a = random() * 2.0 * 3.14159265;
                float r = sqrt(1.0 - z * z);
                return vec3(r * cos(a), r * sin(a), z);
            }

            // SDF 形状
            float sdBox(vec3 p, vec3 b) {
                vec3 q = abs(p) - b;
                return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0);
            }
            float sdSphere(vec3 p, float s) {
                return length(p) - s;
            }
            float sdCylinderZ(vec3 p, float h, float r) {
                vec2 d = abs(vec2(length(p.xy), p.z)) - vec2(r, h);
                return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
            }

            Hit opU(Hit d1, Hit d2) {
                if (d1.d < d2.d) {
                    return d1;
                } else {
                    return d2;
                }
            }

            Hit map(vec3 p) {
                Hit res = Hit(1e20, Material(MAT_DIFFUSE, vec3(0), vec3(0)));

                float dBench = sdBox(p - vec3(0.0, -2.5, 0.0), vec3(6.0, 0.5, 25.0));
                vec3 benchCol = vec3(0.15);
                if (abs(p.x) < 3.0 && p.y > -2.1) {
                    if (mod(p.z, 1.0) < 0.05) benchCol = vec3(0.4);
                    if (mod(p.z, 5.0) < 0.1) benchCol = vec3(0.7);
                }
                res = opU(res, Hit(dBench, Material(MAT_DIFFUSE, benchCol, vec3(0))));

                for(int i=0; i<MAX_LIGHTS; i++) {
                    if(i >= u_numLights) break;
                    vec3 lp = p - u_lightPos[i];
                    if (u_lightTypes[i] == 0) { 
                        float dF1 = sdBox(lp - vec3(-1.0, 0.0, 0.0), vec3(0.2, 2.0, 0.1));
                        float dF2 = sdBox(lp - vec3(0.3, 1.8, 0.0), vec3(1.1, 0.2, 0.1));
                        float dF3 = sdBox(lp - vec3(0.1, 0.2, 0.0), vec3(0.9, 0.2, 0.1));
                        float dF = min(dF1, min(dF2, dF3));
                        res = opU(res, Hit(dF, Material(MAT_EMISSIVE, vec3(0), u_lightColor[i] * 50.0)));
                    } else if (u_lightTypes[i] == 1) { 
                        float dB = sdSphere(lp, 1.5);
                        res = opU(res, Hit(dB, Material(MAT_EMISSIVE, vec3(0), u_lightColor[i] * 30.0)));
                    }
                }

                for(int i=0; i<MAX_LENSES; i++) {
                    if(i >= u_numLenses) break;
                    vec3 lp = p - u_lensPos[i];
                    float R = u_lensR[i];
                    float r = u_lensAperture[i];
                    float dLens = 1e20;
                    
                    if (u_lensTypes[i] == 0) {
                        float offset = sqrt(max(R*R - r*r, 0.001));
                        float d1 = sdSphere(lp - vec3(0,0, offset), R);
                        float d2 = sdSphere(lp - vec3(0,0, -offset), R);
                        dLens = max(d1, d2);
                        float dCyl = sdCylinderZ(lp, 2.0, r);
                        dLens = max(dLens, dCyl);
                    } else if (u_lensTypes[i] == 1) {
                        float dCyl = sdCylinderZ(lp, 0.5, r);
                        float offset = R + 0.2; 
                        float d1 = sdSphere(lp - vec3(0,0, offset), R);
                        float d2 = sdSphere(lp - vec3(0,0, -offset), R);
                        dLens = max(dCyl, max(-d1, -d2));
                    }
                    res = opU(res, Hit(dLens, Material(MAT_GLASS, vec3(0.98, 0.99, 1.0), vec3(0))));
                }

                for(int i=0; i<MAX_SCREENS; i++) {
                    if(i >= u_numScreens) break;
                    vec3 sp = p - u_screenPos[i];
                    if (u_screenTypes[i] == 0) {
                        float dS = sdBox(sp, vec3(4.5, 4.5, 0.05));
                        res = opU(res, Hit(dS, Material(MAT_SCREEN, vec3(0.95), vec3(0))));
                    } else if (u_screenTypes[i] == 1) {
                        float dBoard = sdBox(sp, vec3(4.5, 4.5, 0.05));
                        // 使用 uniform 控制的孔径大小
                        float dHole = sdCylinderZ(sp, 0.2, u_screenAperture[i]); 
                        float dPinhole = max(dBoard, -dHole);
                        res = opU(res, Hit(dPinhole, Material(MAT_DIFFUSE, vec3(0.2), vec3(0))));
                    }
                }

                return res;
            }

            vec3 calcNormal(vec3 p) {
                vec2 e = vec2(0.002, 0);
                return normalize(vec3(
                    map(p + e.xyy).d - map(p - e.xyy).d,
                    map(p + e.yxy).d - map(p - e.yxy).d,
                    map(p + e.yyx).d - map(p - e.yyx).d
                ));
            }

            void main() {
                seed = uint(gl_FragCoord.x * 1973.0 + gl_FragCoord.y * 9277.0 + u_frame * 26699.0);
                
                // 亚像素抖动抗锯齿，极大提升边缘清晰度
                vec2 jitter = vec2(random() - 0.5, random() - 0.5) / u_resolution;
                vec2 ndc = (vUv + jitter) * 2.0 - 1.0;
                
                vec4 target = u_cameraProjectionMatrixInverse * vec4(ndc.x, ndc.y, 1.0, 1.0);
                vec3 rd = (u_cameraWorldMatrix * vec4(normalize(target.xyz / target.w), 0.0)).xyz;
                vec3 ro = (u_cameraWorldMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;

                vec3 color = vec3(0.0);
                vec3 throughput = vec3(1.0);
                
                for (int bounce = 0; bounce < 5; bounce++) {
                    Hit hit = Hit(1e20, Material(MAT_DIFFUSE, vec3(0), vec3(0)));
                    float t = 0.0;
                    
                    // 修复玻璃穿透：使用绝对值距离 abs(h.d) 步进，允许光线在透明介质内部继续传播！
                    for (int i = 0; i < 200; i++) {
                        vec3 p = ro + rd * t;
                        Hit h = map(p);
                        if (abs(h.d) < 0.001) { hit = h; break; }
                        if (t > 150.0) break;
                        t += abs(h.d) * 0.95; 
                    }

                    if (t > 150.0) {
                        color += throughput * vec3(u_envLight);
                        break;
                    }

                    vec3 p = ro + rd * t;
                    vec3 n = calcNormal(p);

                    if (hit.mat.type == MAT_EMISSIVE) {
                        color += throughput * hit.mat.emissive;
                        break;
                    }

                    if (hit.mat.type == MAT_DIFFUSE) {
                        rd = cosineWeightedHemisphere(n);
                        ro = p + n * 0.005; // 沿表面法线推离
                        throughput *= hit.mat.color;
                        
                    } else if (hit.mat.type == MAT_SCREEN) {
                        rd = uniformSphere();
                        ro = p + rd * 0.005; // 光屏向两侧散射
                        throughput *= hit.mat.color;
                        
                    } else if (hit.mat.type == MAT_GLASS) {
                        float ior = 1.5;
                        bool entering = dot(rd, n) < 0.0;
                        float eta = entering ? 1.0 / ior : ior;
                        vec3 normal = entering ? n : -n;

                        float cosTheta = min(dot(-rd, normal), 1.0);
                        float sinTheta = sqrt(1.0 - cosTheta * cosTheta);
                        bool cannotRefract = eta * sinTheta > 1.0; 

                        float r0 = (1.0 - eta) / (1.0 + eta);
                        r0 = r0 * r0;
                        float refProb = r0 + (1.0 - r0) * pow(1.0 - cosTheta, 5.0);

                        if (cannotRefract || random() < refProb) {
                            rd = reflect(rd, normal);
                        } else {
                            rd = refract(rd, normal, eta);
                        }
                        // 无论反射还是折射，都沿着光线前进方向微调起点，彻底解决自相交
                        ro = p + rd * 0.005;
                        throughput *= hit.mat.color;
                    }
                }

                vec3 prevColor = texture2D(tPrevious, vUv).rgb;
                vec3 finalColor = mix(prevColor, color, 1.0 / u_sampleCount);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const displayFragmentShader = `
            precision highp float;
            varying vec2 vUv;
            uniform sampler2D tTexture;
            
            void main() {
                vec3 color = texture2D(tTexture, vUv).rgb;
                color = clamp((color * (2.51 * color + 0.03)) / (color * (2.43 * color + 0.59) + 0.14), 0.0, 1.0);
                color = pow(color, vec3(1.0 / 2.2));
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        // === 材质初始化 ===
        const ptMaterial = new THREE.ShaderMaterial({
            uniforms: {
                tPrevious: { value: null },
                u_sampleCount: { value: 1.0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_cameraWorldMatrix: { value: camera.matrixWorld },
                u_cameraProjectionMatrixInverse: { value: camera.projectionMatrixInverse },
                u_frame: { value: 0 },
                u_envLight: { value: envLight },
                u_numLenses: { value: 0 },
                u_lensTypes: { value: new Int32Array(MAX_LENSES).fill(0) },
                u_lensPos: { value: Array(MAX_LENSES).fill().map(()=>new THREE.Vector3()) },
                u_lensR: { value: new Float32Array(MAX_LENSES).fill(0) },
                u_lensAperture: { value: new Float32Array(MAX_LENSES).fill(0) },
                u_numScreens: { value: 0 },
                u_screenTypes: { value: new Int32Array(MAX_SCREENS).fill(0) },
                u_screenPos: { value: Array(MAX_SCREENS).fill().map(()=>new THREE.Vector3()) },
                u_screenAperture: { value: new Float32Array(MAX_SCREENS).fill(0.3) },
                u_numLights: { value: 0 },
                u_lightTypes: { value: new Int32Array(MAX_LIGHTS).fill(0) },
                u_lightPos: { value: Array(MAX_LIGHTS).fill().map(()=>new THREE.Vector3()) },
                u_lightColor: { value: Array(MAX_LIGHTS).fill().map(()=>new THREE.Vector3()) }
            },
            vertexShader,
            fragmentShader: ptFragmentShader,
            depthWrite: false, depthTest: false
        });

        const displayMaterial = new THREE.ShaderMaterial({
            uniforms: { tTexture: { value: null } },
            vertexShader,
            fragmentShader: displayFragmentShader,
            depthWrite: false, depthTest: false
        });

        const quadGeometry = new THREE.PlaneGeometry(2, 2);
        scenePT.add(new THREE.Mesh(quadGeometry, ptMaterial));
        sceneDisplay.add(new THREE.Mesh(quadGeometry, displayMaterial));

        let needsReset = true;
        const requestReset = () => { needsReset = true; };

        function syncUniforms() {
            ptMaterial.uniforms.u_numLenses.value = lenses.length;
            for(let i=0; i<lenses.length; i++) {
                ptMaterial.uniforms.u_lensTypes.value[i] = lenses[i].type;
                ptMaterial.uniforms.u_lensPos.value[i].copy(lenses[i].pos);
                ptMaterial.uniforms.u_lensR.value[i] = lenses[i].r;
                ptMaterial.uniforms.u_lensAperture.value[i] = lenses[i].aperture;
            }
            ptMaterial.uniforms.u_numScreens.value = screens.length;
            for(let i=0; i<screens.length; i++) {
                ptMaterial.uniforms.u_screenTypes.value[i] = screens[i].type;
                ptMaterial.uniforms.u_screenPos.value[i].copy(screens[i].pos);
                ptMaterial.uniforms.u_screenAperture.value[i] = screens[i].aperture || 0.3;
            }
            ptMaterial.uniforms.u_numLights.value = lights.length;
            for(let i=0; i<lights.length; i++) {
                ptMaterial.uniforms.u_lightTypes.value[i] = lights[i].type;
                ptMaterial.uniforms.u_lightPos.value[i].copy(lights[i].pos);
                ptMaterial.uniforms.u_lightColor.value[i].set(lights[i].color.r, lights[i].color.g, lights[i].color.b);
            }
            ptMaterial.uniforms.u_envLight.value = envLight;
            requestReset();
        }

        const gui = new GUI({ title: '⚙️ 光学器件控制台' });
        let folders = [];
        
        function addObject(type) {
            if(type === 'convex' && lenses.length < MAX_LENSES) lenses.push({ type: 0, pos: new THREE.Vector3(0,0,0), r: 10.0, aperture: 4.0 });
            else if(type === 'concave' && lenses.length < MAX_LENSES) lenses.push({ type: 1, pos: new THREE.Vector3(0,0,0), r: 10.0, aperture: 4.0 });
            else if(type === 'screen' && screens.length < MAX_SCREENS) screens.push({ type: 0, pos: new THREE.Vector3(0,0,10), aperture: 0.3 });
            else if(type === 'pinhole' && screens.length < MAX_SCREENS) screens.push({ type: 1, pos: new THREE.Vector3(0,0,10), aperture: 0.3 });
            else if(type === 'flight' && lights.length < MAX_LIGHTS) lights.push({ type: 0, pos: new THREE.Vector3(0,0,-10), color: new THREE.Color(0xffffff) });
            else if(type === 'bulb' && lights.length < MAX_LIGHTS) lights.push({ type: 1, pos: new THREE.Vector3(0,0,-10), color: new THREE.Color(0xffddaa) });
            else { alert('该类型物体已达数量上限！'); return; }
            rebuildGUI(); syncUniforms();
        }

        function rebuildGUI() {
            folders.forEach(f => f.destroy());
            folders = [];
            
            lenses.forEach((item, i) => {
                const f = gui.addFolder((item.type===0?'🔍 凸透镜 ':'🔮 凹透镜 ') + (i+1));
                f.add(item.pos, 'z', -25, 25).name('Z轴位置(u/v)').onChange(syncUniforms);
                f.add(item, 'r', 2, 30).name('曲率半径').onChange(syncUniforms);
                f.add(item, 'aperture', 1, 8).name('光圈大小').onChange(syncUniforms);
                f.add({del: () => { lenses.splice(i, 1); rebuildGUI(); syncUniforms(); }}, 'del').name('❌ 删除');
                folders.push(f);
            });
            screens.forEach((item, i) => {
                const f = gui.addFolder((item.type===0?'⬜ 光屏 ':'🕳️ 小孔板 ') + (i+1));
                f.add(item.pos, 'z', -25, 25).name('Z轴位置').onChange(syncUniforms);
                if (item.type === 1) {
                    f.add(item, 'aperture', 0.05, 1.5).name('孔径大小').onChange(syncUniforms);
                }
                f.add({del: () => { screens.splice(i, 1); rebuildGUI(); syncUniforms(); }}, 'del').name('❌ 删除');
                folders.push(f);
            });
            lights.forEach((item, i) => {
                const f = gui.addFolder((item.type===0?'🪧 F光源 ':'💡 灯泡 ') + (i+1));
                f.add(item.pos, 'z', -25, 25).name('Z轴位置').onChange(syncUniforms);
                f.add(item.pos, 'x', -10, 10).name('X轴平移').onChange(syncUniforms);
                f.addColor({col: item.color.getHex()}, 'col').name('颜色').onChange(v => { item.color.setHex(v); syncUniforms(); });
                f.add({del: () => { lights.splice(i, 1); rebuildGUI(); syncUniforms(); }}, 'del').name('❌ 删除');
                folders.push(f);
            });
        }

        const sceneParams = {
            addConvex: () => addObject('convex'), addConcave: () => addObject('concave'),
            addScreen: () => addObject('screen'), addPinhole: () => addObject('pinhole'),
            addFLight: () => addObject('flight'), addBulb: () => addObject('bulb'),
            envLight: envLight
        };
        gui.add(sceneParams, 'addFLight').name('➕ 添加 F光源');
        gui.add(sceneParams, 'addBulb').name('➕ 添加 灯泡');
        gui.add(sceneParams, 'addConvex').name('➕ 添加 凸透镜');
        gui.add(sceneParams, 'addConcave').name('➕ 添加 凹透镜');
        gui.add(sceneParams, 'addScreen').name('➕ 添加 光屏');
        gui.add(sceneParams, 'addPinhole').name('➕ 添加 小孔板');
        gui.add(sceneParams, 'envLight', 0, 0.5).name('环境光强度').onChange(v => { envLight = v; syncUniforms(); });
        
        rebuildGUI(); syncUniforms();

        // === 相机控制 (键鼠 + 触控) ===
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        
        window.addEventListener('mousedown', e => {
            if(e.target.tagName !== 'CANVAS') return;
            isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if(isDragging) {
                cameraYaw -= (e.clientX - lastMouseX) * 0.005;
                cameraPitch -= (e.clientY - lastMouseY) * 0.005;
                cameraPitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, cameraPitch));
                camera.quaternion.setFromEuler(new THREE.Euler(cameraPitch, cameraYaw, 0, 'YXZ'));
                lastMouseX = e.clientX; lastMouseY = e.clientY;
                requestReset();
            }
        });

        window.addEventListener('wheel', e => {
            camera.fov += e.deltaY * 0.05;
            camera.fov = Math.max(10, Math.min(120, camera.fov));
            camera.updateProjectionMatrix();
            requestReset();
        });

        const keys = { w:false, a:false, s:false, d:false, q:false, e:false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        let lastPinchDist = 0;
        window.addEventListener('touchstart', e => {
            if(e.target.tagName !== 'CANVAS') return;
            if(e.touches.length === 1) { isDragging = true; lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY; }
        }, {passive: false});
        window.addEventListener('touchend', e => { isDragging = false; if(e.touches.length < 2) lastPinchDist = 0; });
        window.addEventListener('touchmove', e => {
            if(e.touches.length === 1 && isDragging) {
                cameraYaw -= (e.touches[0].clientX - lastMouseX) * 0.005;
                cameraPitch -= (e.touches[0].clientY - lastMouseY) * 0.005;
                cameraPitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, cameraPitch));
                camera.quaternion.setFromEuler(new THREE.Euler(cameraPitch, cameraYaw, 0, 'YXZ'));
                lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
                requestReset();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if(lastPinchDist > 0) {
                    camera.fov += (lastPinchDist - dist) * 0.1;
                    camera.fov = Math.max(10, Math.min(120, camera.fov));
                    camera.updateProjectionMatrix();
                    requestReset();
                }
                lastPinchDist = dist; isDragging = false;
            }
        }, {passive: false});

        let joyMove = { x: 0, y: 0 };
        if ('ontouchstart' in window) {
            document.getElementById('joystick-zone').style.display = 'block';
            try {
                const manager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'white' });
                manager.on('move', (e, data) => { joyMove.x = Math.cos(data.angle.radian) * data.distance * 0.02; joyMove.y = Math.sin(data.angle.radian) * data.distance * 0.02; });
                manager.on('end', () => { joyMove.x = 0; joyMove.y = 0; });
            } catch(e) { console.warn('摇杆加载失败'); }
        }

        function updateCameraTransform() {
            let moved = false;
            const speed = 0.3;
            const forward = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
            const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation).normalize();
            const up = new THREE.Vector3(0, 1, 0);

            let dir = new THREE.Vector3();
            if(keys.w) dir.add(forward); if(keys.s) dir.sub(forward);
            if(keys.a) dir.sub(right); if(keys.d) dir.add(right);
            if(keys.e) dir.add(up); if(keys.q) dir.sub(up);

            if(joyMove.x !== 0 || joyMove.y !== 0) {
                dir.add(forward.clone().multiplyScalar(joyMove.y));
                dir.add(right.clone().multiplyScalar(joyMove.x));
            }

            if(dir.lengthSq() > 0.01) {
                camera.position.add(dir.normalize().multiplyScalar(speed));
                moved = true;
            }
            if(moved) requestReset();
            
            camera.updateMatrixWorld();
            ptMaterial.uniforms.u_cameraWorldMatrix.value.copy(camera.matrixWorld);
            ptMaterial.uniforms.u_cameraProjectionMatrixInverse.value.copy(camera.projectionMatrixInverse);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            rtA.setSize(window.innerWidth, window.innerHeight);
            rtB.setSize(window.innerWidth, window.innerHeight);
            ptMaterial.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            requestReset();
        });

        const sampleCountSpan = document.getElementById('sample-count');
        const loadingDiv = document.getElementById('loading');
        
        function animate() {
            requestAnimationFrame(animate);
            updateCameraTransform();

            ptMaterial.uniforms.u_frame.value++;

            if (needsReset) {
                ptMaterial.uniforms.u_sampleCount.value = 1.0;
                needsReset = false;
            } else {
                ptMaterial.uniforms.u_sampleCount.value += 1.0;
            }

            ptMaterial.uniforms.tPrevious.value = rtA.texture;
            renderer.setRenderTarget(rtB);
            renderer.render(scenePT, cameraPT);

            displayMaterial.uniforms.tTexture.value = rtB.texture;
            renderer.setRenderTarget(null);
            renderer.render(sceneDisplay, cameraPT);

            let temp = rtA; rtA = rtB; rtB = temp;

            sampleCountSpan.innerText = Math.floor(ptMaterial.uniforms.u_sampleCount.value);
            if (loadingDiv.style.display !== 'none') loadingDiv.style.display = 'none';
        }

        camera.updateMatrixWorld();
        animate();
    </script>
</body>
</html>
